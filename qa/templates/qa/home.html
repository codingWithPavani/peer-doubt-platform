{% extends 'qa/base.html' %}

{% block content %}

<h1>All Questions</h1>

{% for q in questions %}

<div class="card">

    <h3>
        <a href="{% url 'question_detail' q.id %}">
            {{ q.title }}
        </a>
    </h3>

    <p>{{ q.body|truncatewords:20 }}</p>

    <p>
        Asked by:
        {{ q.author.username }}
    </p>

</div>

{% empty %}

<p>No questions available.</p>

{% endfor %}

{% endblock %}
