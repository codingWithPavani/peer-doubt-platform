{% extends 'qa/base.html' %}

{% block content %}

<style>

/* ===== Container (KEEP SAME SIZE) ===== */
.edit-container{
    max-width: 700px;
    margin: 40px auto;
    padding: 20px;
}

/* ===== Card (same compact size, only improved look) ===== */
.edit-card{
    background:#ffffff;
    border-radius:14px;
    padding:25px;
    box-shadow:0 3px 12px rgba(0,0,0,0.08);
    border:1px solid #eef2f7;
}

/* ===== Header (smaller, no big redesign) ===== */
.edit-header{
    margin-bottom:20px;
    padding-bottom:12px;
    border-bottom:1px solid #eef2f7;
}

.edit-title{
    font-size:22px;
    color:#1a1a2e;
    margin-bottom:4px;
    font-weight:600;
}

.edit-subtitle{
    color:#6c757d;
    font-size:13px;
}

/* ===== Form (NO layout change) ===== */
form p{
    margin-bottom:15px;
}

form label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
    color:#2c3e50;
    font-size:14px;
}

form input,
form textarea,
form select{
    width:100%;
    padding:10px;
    border:1px solid #dcdfe6;
    border-radius:8px;
    font-size:14px;
    background:#fafbfc;
    transition:0.2s;
    box-sizing:border-box;
}

form textarea{
    min-height:140px;
    resize:vertical;
}

form input:focus,
form textarea:focus,
form select:focus{
    outline:none;
    border-color:#4a90d9;
    background:#fff;
    box-shadow:0 0 0 3px rgba(74,144,217,0.15);
}

/* ===== Buttons (compact like original) ===== */
.button-group{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.save-btn{
    background:#4a90d9;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    font-weight:500;
}

.save-btn:hover{
    background:#357abd;
}

.cancel-btn{
    text-decoration:none;
    background:#f1f5f9;
    color:#2c3e50;
    padding:10px 16px;
    border-radius:8px;
    font-size:14px;
    font-weight:500;
}

.cancel-btn:hover{
    background:#e2e8f0;
}

/* ===== Responsive ===== */
@media(max-width:768px){
    .edit-container{
        max-width: 100%;
        padding: 15px;
    }

    .button-group{
        flex-direction:column;
    }

    .save-btn,
    .cancel-btn{
        width:100%;
        text-align:center;
    }
}

</style>

<div class="edit-container">

    <div class="edit-card">

        <div class="edit-header">

            <h2 class="edit-title">Edit Question</h2>

            <p class="edit-subtitle">
                Update your question and save changes.
            </p>

        </div>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="button-group">

                <button type="submit" class="save-btn">
                    Save Changes
                </button>

                <a href="{% url 'profile' request.user.id %}" class="cancel-btn">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
