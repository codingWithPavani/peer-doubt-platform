{% extends 'qa/base.html' %}

{% block content %}

<style>

/* ===== CENTER PAGE ===== */
.login-wrapper{
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f7fb;
    padding: 20px;
}

/* ===== CARD ===== */
.login-card{
    width: 100%;
    max-width: 420px;
    background: #ffffff;
    padding: 35px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* TITLE */
.login-title{
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 25px;
    color: #1a1a2e;
}

/* INPUTS */
.login-card input{
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #e0e6ed;
    background: #fafbfc;
    font-size: 14px;
    transition: 0.2s;
}

.login-card input:focus{
    outline: none;
    border-color: #4a90d9;
    background: white;
    box-shadow: 0 0 0 3px rgba(74,144,217,0.12);
}

/* BUTTON */
.login-btn{
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg,#4a90d9,#357abd);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

.login-btn:hover{
    transform: translateY(-2px);
}

/* SMALL TEXT */
.footer-text{
    text-align: center;
    margin-top: 15px;
    font-size: 13px;
    color: #666;
}
a{
    text-decoration: none;
    color: #357abd;
}
</style>

<div class="login-wrapper">

    <div class="login-card">

        <div class="login-title">
            Welcome Back 
        </div>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

        <div class="footer-text">
            Don’t have an account?<a href="{% url 'register' %}">Sign up</a>
        </div>

    </div>

</div>

{% endblock %}
